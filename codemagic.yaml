workflows:
  ios-release-workflow:
    name: Asas iOS App Store Release
    instance_type: mac_mini_m1
    max_build_duration: 120
    integrations:
      app_store_connect: "ASAS API" 
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.asas.abuljainpro
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: إعادة بناء وهيكلة ملفات الآيفون من الصفر
        script: |
          flutter clean
          flutter create . --platforms=ios
          flutter pub get
      - name: ضبط المعرّف (Bundle ID)
        script: |
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = com.asas.abuljainpro;/g" ios/Runner.xcodeproj/project.pbxproj
      - name: فرض إصدار 13.0 وتحديث المكتبات بالقوة
        script: |
          cd ios
          # هذه الأوامر تدمج إصدار 13.0 في أعلى الملف أياً كان شكله
          echo "platform :ios, '13.0'" > Podfile.temp
          cat Podfile >> Podfile.temp
          mv Podfile.temp Podfile
          
          # مسح الكاش القديم وتحديث السيرفرات
          rm -rf Podfile.lock Pods
          pod repo update
          pod install
      - name: إجبار المشروع على استخدام ملفات التوقيع المرفوعة
        script: |
          xcode-project use-profiles
      - name: بناء النسخة النهائية (App Store)
        script: |
          flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true