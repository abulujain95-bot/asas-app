workflows:
  ios-release-workflow:
    name: Asas iOS App Store Release
    instance_type: mac_mini_m1
    max_build_duration: 120
    integrations:
      app_store_connect: "ASAS API" 
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.asas.abuljainpro
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: تهيئة وتوليد ملفات الآيفون المفقودة
        script: |
          flutter clean
          flutter create . --platforms=ios
          flutter pub get
      - name: ضبط المعرّف وتهيئة الروابط المحلية للمكتبات
        script: |
          # 1. تغيير المعرّف
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = com.asas.abuljainpro;/g" ios/Runner.xcodeproj/project.pbxproj
          
          # 2. هذا هو الأمر السحري! يقوم بربط جميع المكتبات (مثل الإعلانات والويب) محلياً داخل نظام الماك
          flutter build ios --config-only
          
          # 3. تفعيل إصدار 13.0 لتوافق إعلانات جوجل
          sed -i '' "s/^# platform :ios.*/platform :ios, '13.0'/g" ios/Podfile
          sed -i '' "s/^platform :ios.*/platform :ios, '13.0'/g" ios/Podfile
      - name: إجبار المشروع على استخدام ملفات التوقيع المرفوعة
        script: |
          xcode-project use-profiles
      - name: بناء النسخة النهائية (App Store)
        script: |
          # أمر البناء هذا سيقوم تلقائياً بتنفيذ pod install بالطريقة الصحيحة والآمنة الخاصة بفلاتر
          flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true