workflows:
  ios-release-workflow:
    name: Asas iOS App Store Release
    instance_type: mac_mini_m1
    max_build_duration: 120
    integrations:
      app_store_connect: "ASAS API" 
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.asas.abuljainpro
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: تهيئة المشروع وضبط المعرّف
        script: |
          flutter clean
          flutter pub get
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = com.asas.abuljainpro;/g" ios/Runner.xcodeproj/project.pbxproj
      - name: إنشاء وتكوين ملف Podfile لتوافق الآيفون
        script: |
          cd ios
          flutter build ios --config-only
          sed -i '' "s/# platform :ios, '12.0'/platform :ios, '13.0'/g" Podfile
          sed -i '' "s/# platform :ios, '11.0'/platform :ios, '13.0'/g" Podfile
          sed -i '' "s/# platform :ios, '9.0'/platform :ios, '13.0'/g" Podfile
      - name: إعداد مكتبات نظام الآيفون وتطهير الكاش
        script: |
          cd ios
          rm -rf Podfile.lock Pods
          pod install --repo-update
      - name: إجبار المشروع على استخدام ملفات التوقيع المرفوعة
        script: |
          xcode-project use-profiles
      - name: بناء النسخة النهائية (App Store)
        script: |
          flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true