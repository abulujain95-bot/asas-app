workflows:
  ios-release-workflow:
    name: Asas iOS App Store Release
    instance_type: mac_mini_m1
    max_build_duration: 120
    integrations:
      app_store_connect: "ASAS API" 
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.asas.abuljainpro
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: تعطيل مدير الحزم (SPM) لتفادي تعارض الإعلانات
        script: |
          flutter config --no-enable-swift-package-manager
      - name: تهيئة وتوليد ملفات الآيفون المفقودة
        script: |
          flutter clean
          flutter create . --platforms=ios
          flutter pub get
      - name: تنظيف عميق لبيئة CocoaPods والاعتمادات
        script: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          rm -rf ~/.cocoapods/repos
          pod cache clean --all
      - name: ضبط المعرّف وتهيئة الروابط المحلية للمكتبات
        script: |
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = com.asas.abuljainpro;/g" ios/Runner.xcodeproj/project.pbxproj
          flutter build ios --config-only
          sed -i '' "s/^# platform :ios.*/platform :ios, '13.0'/g" ios/Podfile
          sed -i '' "s/^platform :ios.*/platform :ios, '13.0'/g" ios/Podfile
      - name: إجبار المشروع على استخدام ملفات التوقيع المرفوعة
        script: |
          xcode-project use-profiles
      - name: بناء النسخة النهائية (App Store)
        script: |
          flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true